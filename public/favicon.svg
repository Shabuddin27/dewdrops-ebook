<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FBBF24"/>
      <stop offset="55%"  stop-color="#D97706"/>
      <stop offset="100%" stop-color="#92400E"/>
    </linearGradient>
  </defs>

  <!-- Amber gradient background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Book-spine D icon (translated from Navbar SVG, original 18×22 viewBox) -->
  <g transform="translate(6.5, 5)" stroke-linecap="round" fill="none">
    <!-- Spine -->
    <line x1="2" y1="1"  x2="2"  y2="21" stroke="white" stroke-opacity="0.95" stroke-width="2"/>
    <!-- Top cover -->
    <line x1="2" y1="1"  x2="9"  y2="1"  stroke="white" stroke-opacity="0.90" stroke-width="1.8"/>
    <!-- Bottom cover -->
    <line x1="2" y1="21" x2="9"  y2="21" stroke="white" stroke-opacity="0.90" stroke-width="1.8"/>
    <!-- Pages — longer in the middle to form the D curve silhouette -->
    <line x1="2" y1="4"  x2="8.5" y2="4"  stroke="white" stroke-opacity="0.72" stroke-width="1.1"/>
    <line x1="2" y1="7"  x2="14"  y2="7"  stroke="white" stroke-opacity="0.62" stroke-width="1.1"/>
    <line x1="2" y1="10" x2="17"  y2="10" stroke="white" stroke-opacity="0.55" stroke-width="1.1"/>
    <line x1="2" y1="12" x2="17"  y2="12" stroke="white" stroke-opacity="0.55" stroke-width="1.1"/>
    <line x1="2" y1="15" x2="14"  y2="15" stroke="white" stroke-opacity="0.62" stroke-width="1.1"/>
    <line x1="2" y1="18" x2="8.5" y2="18" stroke="white" stroke-opacity="0.72" stroke-width="1.1"/>
  </g>
</svg>
