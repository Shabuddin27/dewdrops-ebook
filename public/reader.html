<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Reader</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' };</script>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html, body { height: 100%; overflow: hidden; }
  body { -webkit-font-smoothing: antialiased; }
  #reader{
    background-color:#f4efe6;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,.7), transparent 26%),
      linear-gradient(135deg, #f7f2ea 0%, #e7ded0 100%);
  }
  .page-body{
    font-size: var(--rfs, 16px);
    line-height: var(--rlh, 1.65);
    white-space: pre-wrap;
    word-break: break-word;
    hyphens: auto;
  }
  #readingView{
    background: transparent;
    filter: drop-shadow(0 22px 34px rgba(76, 61, 40, .18));
  }
  #spread{
    position: relative;
    background: #f7f1e6;
    box-shadow:
      0 18px 42px rgba(72, 55, 34, .22),
      0 2px 0 rgba(255,255,255,.7) inset,
      0 -1px 0 rgba(80,60,36,.08) inset;
  }
  #spread::before{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background-image:
      radial-gradient(rgba(105, 83, 49, .08) 1px, transparent 1px),
      linear-gradient(90deg, transparent calc(50% - 1px), rgba(74, 56, 33, .12) 50%, transparent calc(50% + 1px));
    background-size: 18px 18px, 100% 100%;
    opacity:.35;
    mix-blend-mode:multiply;
    z-index:1;
  }
  #leftPage, #rightPage{
    background:
      linear-gradient(90deg, rgba(255,255,255,.55), rgba(255,255,255,0) 12%),
      #fbf7ef;
  }
  #leftPage::after, #rightPage::after{
    content:"";
    position:absolute;
    top:0;
    bottom:0;
    width:18px;
    pointer-events:none;
    z-index:2;
  }
  #leftPage::after{
    right:0;
    background: linear-gradient(90deg, transparent, rgba(88, 65, 36, .12));
  }
  #rightPage::after{
    left:0;
    background: linear-gradient(90deg, rgba(88, 65, 36, .14), transparent);
  }
  #leftBody, #rightBody, #leftFolio, #rightFolio{
    position:relative;
    z-index:3;
  }
  .dark #reader{
    background-color:#141414;
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,.05), transparent 28%),
      linear-gradient(135deg, #191815 0%, #0e0e0d 100%);
  }
  .dark #spread{
    background:#27241f;
    box-shadow:
      0 18px 42px rgba(0,0,0,.45),
      0 1px 0 rgba(255,255,255,.05) inset;
  }
  .dark #spread::before{
    background-image:
      radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
      linear-gradient(90deg, transparent calc(50% - 1px), rgba(0,0,0,.35) 50%, transparent calc(50% + 1px));
    opacity:.45;
    mix-blend-mode:screen;
  }
  .dark #leftPage, .dark #rightPage{
    background:
      linear-gradient(90deg, rgba(255,255,255,.03), rgba(255,255,255,0) 12%),
      #25231f;
  }
  #measure{ position: fixed; left: -99999px; top: 0; visibility: hidden; pointer-events: none; }
  .hide { display: none !important; }
  .no-sb::-webkit-scrollbar{ display:none; }
  .no-sb{ scrollbar-width:none; }
  #readerControlsPanel{ z-index:55; }
  #coverView, #introView{ max-width:100%; max-height:100%; }
  @media (min-width: 768px){
    #coverView, #introView{ max-width:50%; }
  }
  @media (max-width: 767px){
    #rightPage{ display:none !important; }
    #leftPage{ border-right-width:0 !important; }
    #spread::before{
      background-image: radial-gradient(rgba(105, 83, 49, .08) 1px, transparent 1px);
    }
    .dark #spread::before{
      background-image: radial-gradient(rgba(255,255,255,.05) 1px, transparent 1px);
    }
    #leftPage::after{ display:none; }
  }
  /* highlights */
  mark[data-hlid]{ cursor:pointer; border-radius:2px; }
  /* floating panels – dark mode glass */
  .dark #hlNotesWrap{ background:rgba(22,20,16,0.88) !important; border-color:rgba(80,65,45,0.5) !important; box-shadow:0 8px 32px rgba(0,0,0,0.5),0 1px 0 rgba(255,255,255,0.04) inset !important; }
  .dark #hlNotesWrap .flex-shrink-0{ border-color:rgba(80,65,45,0.4) !important; }
  .dark #hlNotesWrap span{ color:#d4c4a8; }
  .dark #hlNotesWrap button{ color:#9b8a72; }
  /* bookmarks glass panel */
  /* keep header/footer background but avoid blurring the page when bookmarks open */
  #bmarkHeader,#bmarkFooter{ background:rgba(255,250,241,0.72); }
  .dark #bmarkHeader,.dark #bmarkFooter{ background:rgba(22,20,16,0.72) !important; }
  /* don't include #bmarkInner here to prevent page blur when the bookmark drawer opens */
  #readerControlsPanel, #hlPopup { backdrop-filter: blur(22px) saturate(1.15); -webkit-backdrop-filter: blur(22px) saturate(1.15); }
  #readerControlsPanel { background:rgba(255,250,241,0.92); border:1px solid rgba(210,190,160,0.28); box-shadow:0 32px 78px rgba(72,55,34,0.18); }
  .dark #readerControlsPanel { background:rgba(18,18,18,0.9); border-color:rgba(95,85,75,0.3); }
  #hlPopup { background:rgba(255,255,255,0.94); border:1px solid rgba(210,190,160,0.35); box-shadow:0 18px 48px rgba(72,55,34,0.2); }
  .dark #hlPopup { background:rgba(18,18,18,0.94); border-color:rgba(95,85,75,0.35); }
  #bmarkInner { background:rgba(255,250,241,0.94); }
  .dark #bmarkInner { background:rgba(18,18,18,0.94) !important; }
  .dark #tocInner { background:rgba(18,18,16,0.94) !important; border-color:rgba(80,65,45,0.5) !important; }
  .dark #tocHeader { background:rgba(22,20,16,0.72) !important; border-color:rgba(80,65,45,0.4) !important; }
  #titleEl { max-width:88vw; white-space:normal; word-break:break-word; line-height:1.2; }
</style>
</head>
<body class="bg-gradient-to-br from-[#f8f9fa] to-[#e9ecef] dark:from-[#1a1a1a] dark:to-[#0d0d0d]">

<div id="reader" class="fixed inset-0 flex overflow-hidden select-none">

  <!-- ============ READER CONTROLS POPUP ============ -->
  <div id="readerControls" class="absolute z-50 top-3 right-3 flex flex-col items-end gap-2">
    <div class="relative">
      <button id="settingsBtn" class="p-1.5 text-[#6f5f4b] dark:text-gray-300 bg-[#fffaf1]/90 dark:bg-gray-800/90 border border-[#e2d2ba] dark:border-gray-700 rounded-lg shadow-md backdrop-blur hover:bg-white dark:hover:bg-gray-700 active:scale-95 sm:p-2" title="Reader settings">
        <i data-lucide="settings" class="w-4 h-4 sm:w-[18px] sm:h-[18px]"></i>
      </button>
      <div id="readerControlsPanel" class="hidden absolute right-0 mt-2 w-[min(340px,calc(100vw-2rem))] rounded-3xl border border-gray-200 bg-white p-4 shadow-2xl dark:border-gray-700 dark:bg-gray-900">
        <div class="space-y-4">
          <div>
            <div class="flex items-center justify-between mb-2">
              <div class="flex items-center gap-1.5">
                <i data-lucide="type" class="w-[14px] h-[14px] text-amber-600"></i>
                <label class="text-xs font-medium dark:text-white">Font Size</label>
              </div>
              <span id="fsVal" class="px-2 py-0.5 text-[10px] font-medium text-amber-700 bg-amber-100 rounded-full dark:bg-amber-900/30 dark:text-amber-400">16px</span>
            </div>
            <div class="flex items-center gap-2">
              <button data-fs="-1" class="fsBtn p-2 bg-gray-100 rounded-lg dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600"><i data-lucide="minus" class="w-3 h-3 dark:text-white"></i></button>
              <input id="fsRange" type="range" min="12" max="28" value="16" class="flex-1 h-1.5 rounded-full appearance-none bg-gray-200 dark:bg-gray-700">
              <button data-fs="1" class="fsBtn p-2 bg-gray-100 rounded-lg dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600"><i data-lucide="plus" class="w-3 h-3 dark:text-white"></i></button>
            </div>
          </div>
          <div>
            <div class="flex items-center justify-between mb-2">
              <div class="flex items-center gap-1.5">
                <i data-lucide="align-left" class="w-[14px] h-[14px] text-amber-600"></i>
                <label class="text-xs font-medium dark:text-white">Line Height</label>
              </div>
              <span id="lhVal" class="px-2 py-0.5 text-[10px] font-medium text-amber-700 bg-amber-100 rounded-full dark:bg-amber-900/30 dark:text-amber-400">1.65</span>
            </div>
            <div class="flex items-center gap-2">
              <button data-lh="-0.1" class="lhBtn p-2 bg-gray-100 rounded-lg dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600"><i data-lucide="minus" class="w-3 h-3 dark:text-white"></i></button>
              <input id="lhRange" type="range" min="1.2" max="2.0" step="0.05" value="1.65" class="flex-1 h-1.5 rounded-full appearance-none bg-gray-200 dark:bg-gray-700">
              <button data-lh="0.1" class="lhBtn p-2 bg-gray-100 rounded-lg dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600"><i data-lucide="plus" class="w-3 h-3 dark:text-white"></i></button>
            </div>
          </div>
          <div>
            <div class="flex items-center gap-1.5 mb-2">
              <i data-lucide="palette" class="w-[14px] h-[14px] text-amber-600"></i>
              <label class="text-xs font-medium dark:text-white">Font</label>
            </div>
            <div class="grid grid-cols-3 gap-1.5">
              <button data-ff="serif" class="ffBtn py-2 rounded-lg text-xs font-serif">Serif</button>
              <button data-ff="sans" class="ffBtn py-2 rounded-lg text-xs font-sans">Sans</button>
              <button data-ff="mono" class="ffBtn py-2 rounded-lg text-xs font-mono">Mono</button>
            </div>
          </div>
          <div>
            <div class="flex items-center gap-1.5 mb-2">
              <i data-lucide="sun" class="w-[14px] h-[14px] text-amber-600"></i>
              <i data-lucide="moon" class="w-[14px] h-[14px] text-amber-600"></i>
              <label class="text-xs font-medium dark:text-white">Theme</label>
            </div>
            <div class="grid grid-cols-2 gap-2">
              <button id="themeLight" class="flex items-center justify-center gap-1.5 py-2 rounded-lg text-xs"><i data-lucide="sun" class="w-3 h-3"></i><span>Light</span></button>
              <button id="themeDark" class="flex items-center justify-center gap-1.5 py-2 rounded-lg text-xs"><i data-lucide="moon" class="w-3 h-3"></i><span>Dark</span></button>
            </div>
          </div>
          <div class="grid grid-cols-2 gap-2 pt-2 border-t border-gray-200 dark:border-gray-700">
            <button id="fsToggle" class="flex items-center justify-center gap-1.5 py-2 rounded-lg text-xs bg-gray-100 dark:bg-gray-700 dark:text-white hover:bg-gray-200 dark:hover:bg-gray-600"><i data-lucide="maximize-2" class="w-3 h-3"></i><span id="fsToggleLabel">Fullscreen</span></button>
            <button id="resetBtn" class="flex items-center justify-center gap-1.5 py-2 rounded-lg text-xs bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 hover:bg-red-100"><i data-lucide="rotate-ccw" class="w-3 h-3"></i><span>Reset</span></button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ TABLE OF CONTENTS PANEL ============ -->
  <div id="tocWrap" class="hide fixed inset-0 z-[1000]" style="pointer-events:none">
    <div id="tocOverlay" class="absolute inset-0" style="background:transparent;pointer-events:none"></div>
    <div id="tocInner" class="absolute left-2 top-12 w-[min(316px,calc(100vw-1rem))] max-h-[72vh] flex flex-col rounded-2xl overflow-hidden no-sb" style="background:rgba(255,250,241,0.96);backdrop-filter:blur(28px) saturate(1.5);-webkit-backdrop-filter:blur(28px) saturate(1.5);border:1px solid rgba(210,190,160,0.45);box-shadow:0 14px 44px rgba(72,55,34,0.22),0 1.5px 0 rgba(255,255,255,0.6) inset;pointer-events:auto">
      <div id="tocHeader" class="sticky top-0 z-10 border-b flex-shrink-0" style="border-color:rgba(210,190,160,0.38);background:rgba(255,250,241,0.72)">
        <div class="flex items-center justify-between px-4 py-3">
          <div class="flex items-center gap-2">
            <i data-lucide="book-open" class="w-3.5 h-3.5 text-amber-500"></i>
            <h2 class="text-[10.5px] font-bold text-[#5a4a35] dark:text-[#d4c4a8]" style="letter-spacing:0.05em;text-transform:uppercase">Contents</h2>
          </div>
          <button id="tocClose" class="p-1.5 rounded-lg text-[#9b8a72] dark:text-gray-400 hover:bg-black/8 active:scale-95 transition-all">
            <i data-lucide="x" class="w-3.5 h-3.5"></i>
          </button>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto no-sb p-1.5" id="tocList"></div>
    </div>
  </div>

  <!-- ============ BOOKMARKS DRAWER (right side) ============ -->
  <div id="bmarkWrap" class="hide fixed inset-0 z-[1000]" style="pointer-events:none">
    <div id="bmarkOverlay" class="absolute inset-0" style="background:transparent;pointer-events:none;z-index:40"></div>
    <div id="bmarkInner" class="absolute left-2 top-12 w-[min(316px,calc(100vw-1rem))] max-h-[72vh] flex flex-col rounded-2xl overflow-hidden no-sb" style="background:rgba(255,250,241,0.98);border:1px solid rgba(210,190,160,0.45);box-shadow:0 14px 44px rgba(72,55,34,0.22);z-index:1001;pointer-events:auto">
      <div id="bmarkHeader" class="sticky top-0 z-10 border-b flex-shrink-0" style="border-color:rgba(210,190,160,0.38)">
        <div class="flex items-center justify-between px-4 py-3">
          <div class="flex items-center gap-2">
            <i data-lucide="bookmark" class="w-3.5 h-3.5 text-amber-500"></i>
            <h2 class="text-[10.5px] font-bold text-[#5a4a35] dark:text-[#d4c4a8]" style="letter-spacing:0.05em;text-transform:uppercase">Bookmarks</h2>
          </div>
          <button id="bmarkClose" class="p-1.5 rounded-lg text-[#9b8a72] dark:text-gray-400 hover:bg-black/8 active:scale-95 transition-all">
            <i data-lucide="x" class="w-3.5 h-3.5"></i>
          </button>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto no-sb p-1.5" id="bmarkList"></div>
      <div id="bmarkFooter" class="p-3 border-t flex-shrink-0" style="border-color:rgba(210,190,160,0.38)">
        <button id="addBmarkBtn" class="w-full flex items-center justify-center gap-2 py-2.5 bg-amber-600 hover:bg-amber-700 active:bg-amber-800 text-white text-xs font-semibold rounded-xl transition-colors active:scale-95 shadow-md">
          <i data-lucide="bookmark-plus" class="w-3.5 h-3.5"></i>
          Add Bookmark Here
        </button>
      </div>
    </div>
  </div>

  <!-- ============ HIGHLIGHTS & NOTES PANEL (floating glass) ============ -->
  <div id="hlNotesWrap" class="hide fixed z-[100] top-12 sm:top-[3.5rem] left-2 w-[min(316px,calc(100vw-1rem))] max-h-[72vh] flex flex-col rounded-2xl overflow-hidden" style="background:rgba(255,250,241,0.88);backdrop-filter:blur(28px) saturate(1.5);-webkit-backdrop-filter:blur(28px) saturate(1.5);border:1px solid rgba(210,190,160,0.45);box-shadow:0 14px 44px rgba(72,55,34,0.22),0 1.5px 0 rgba(255,255,255,0.6) inset">
    <div class="flex items-center justify-between px-3.5 py-2.5 border-b flex-shrink-0" style="border-color:rgba(210,190,160,0.35)">
      <div class="flex items-center gap-2">
        <i data-lucide="highlighter" class="w-3.5 h-3.5 text-amber-500"></i>
        <span class="text-[10.5px] font-bold text-[#5a4a35]" style="letter-spacing:0.05em;text-transform:uppercase">Highlights &amp; Notes</span>
      </div>
      <button id="hlNotesClose" class="p-1 rounded-lg text-[#9b8a72] hover:bg-black/8 active:scale-95 transition-all">
        <i data-lucide="x" class="w-3.5 h-3.5"></i>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto no-sb py-1.5" id="hlNotesList"></div>
  </div>

  <!-- ============ SEARCH BAR ============ -->
  <div id="searchBar" class="hide fixed z-[55] top-12 sm:top-[3.25rem] left-2 right-2 sm:left-auto sm:right-14 sm:max-w-xs">
    <div class="flex items-center gap-1.5 px-2.5 py-1.5 bg-[#fffaf1]/95 dark:bg-gray-800/95 border border-[#e2d2ba] dark:border-gray-700 rounded-xl shadow-lg backdrop-blur">
      <i data-lucide="search" class="w-3.5 h-3.5 text-gray-400 flex-shrink-0"></i>
      <input id="searchInput" type="text" placeholder="Find in chapter…" autocomplete="off" spellcheck="false"
        class="flex-1 min-w-0 text-xs bg-transparent outline-none text-gray-800 dark:text-white placeholder:text-gray-400">
      <span id="searchCount" class="text-[10px] text-gray-400 dark:text-gray-500 whitespace-nowrap tabular-nums"></span>
      <button id="searchPrev" class="p-0.5 rounded hover:bg-black/5 dark:hover:bg-white/10 text-gray-500 dark:text-gray-400" title="Previous (Shift+Enter)">
        <i data-lucide="chevron-up" class="w-3.5 h-3.5"></i>
      </button>
      <button id="searchNext" class="p-0.5 rounded hover:bg-black/5 dark:hover:bg-white/10 text-gray-500 dark:text-gray-400" title="Next (Enter)">
        <i data-lucide="chevron-down" class="w-3.5 h-3.5"></i>
      </button>
      <button id="searchClose" class="p-0.5 rounded hover:bg-black/5 dark:hover:bg-white/10 text-gray-400" title="Close">
        <i data-lucide="x" class="w-3.5 h-3.5"></i>
      </button>
    </div>
  </div>

  <!-- ============ HIGHLIGHT TOOLBAR ============ -->
  <div id="hlToolbar" class="hide fixed z-[200] flex items-center gap-1 px-2 py-1.5 bg-white dark:bg-gray-800 rounded-xl shadow-2xl border border-gray-100 dark:border-gray-700">
    <button data-hlcolor="rgba(254,249,195,0.92)" class="hlColorBtn w-5 h-5 rounded-full bg-yellow-200 border-2 border-transparent hover:border-gray-400 transition-all" title="Yellow"></button>
    <button data-hlcolor="rgba(187,247,208,0.92)" class="hlColorBtn w-5 h-5 rounded-full bg-green-200 border-2 border-transparent hover:border-gray-400 transition-all" title="Green"></button>
    <button data-hlcolor="rgba(191,219,254,0.92)" class="hlColorBtn w-5 h-5 rounded-full bg-blue-200 border-2 border-transparent hover:border-gray-400 transition-all" title="Blue"></button>
    <button data-hlcolor="rgba(254,202,202,0.92)" class="hlColorBtn w-5 h-5 rounded-full bg-red-200 border-2 border-transparent hover:border-gray-400 transition-all" title="Pink"></button>
    <div class="w-px h-4 bg-gray-200 dark:bg-gray-600 mx-0.5"></div>
    <button id="hlNoteBtn" class="flex items-center gap-1 px-1.5 py-1 text-[10px] text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700 rounded-lg transition-colors whitespace-nowrap">
      <i data-lucide="pencil-line" class="w-3 h-3"></i><span>Note</span>
    </button>
    <button id="hlCancelBtn" class="p-1 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700">
      <i data-lucide="x" class="w-3 h-3"></i>
    </button>
  </div>

  <!-- ============ HIGHLIGHT POPUP (click on mark) ============ -->
  <div id="hlPopup" class="hide fixed z-[210] bg-white dark:bg-gray-800 rounded-xl shadow-2xl border border-gray-100 dark:border-gray-700 p-3 max-w-[200px]">
    <p id="hlPopupNote" class="text-[11px] text-gray-600 dark:text-gray-300 mb-2 italic leading-snug"></p>
    <button id="hlPopupDel" class="flex items-center gap-1.5 text-[11px] text-red-500 hover:text-red-600 font-medium">
      <i data-lucide="trash-2" class="w-3 h-3"></i> Remove highlight
    </button>
  </div>

  <!-- ============ NOTE INPUT MODAL ============ -->
  <div id="noteModal" class="hide fixed inset-0 z-[300] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
    <div class="w-full max-w-xs bg-white dark:bg-gray-900 rounded-2xl shadow-2xl p-4">
      <h3 class="text-sm font-semibold dark:text-white mb-2">Add Note</h3>
      <p id="noteSelText" class="text-[11px] text-gray-500 dark:text-gray-400 mb-3 italic line-clamp-2 bg-amber-50 dark:bg-amber-900/20 rounded-lg px-2 py-1.5"></p>
      <textarea id="noteInput" rows="3" placeholder="Your note…" class="w-full text-xs border border-gray-200 dark:border-gray-600 rounded-xl px-3 py-2 bg-white dark:bg-gray-800 dark:text-white outline-none focus:border-amber-400 resize-none"></textarea>
      <div class="flex gap-2 mt-3">
        <button id="noteSaveBtn" class="flex-1 py-2.5 bg-amber-600 hover:bg-amber-700 text-white text-xs font-semibold rounded-xl transition-colors">Save</button>
        <button id="noteCancelBtn" class="px-4 py-2.5 bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-300 text-xs rounded-xl hover:bg-gray-200 dark:hover:bg-gray-600 transition-colors">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ============ MAIN AREA ============ -->
  <div class="relative flex flex-col items-center justify-center flex-1 h-full min-h-0 gap-1.5 px-1.5 py-1.5 overflow-hidden sm:gap-2 sm:px-2 sm:py-2 md:px-3 md:py-3">

    <div class="absolute z-50 flex gap-2 top-2 left-2">
      <button id="backBtn" title="Back" class="p-1.5 text-[#6f5f4b] dark:text-gray-300 bg-[#fffaf1]/90 dark:bg-gray-800/90 border border-[#e2d2ba] dark:border-gray-700 rounded-lg shadow-md backdrop-blur hover:bg-white dark:hover:bg-gray-700 active:scale-95 sm:p-2"><i data-lucide="arrow-left" class="w-4 h-4 sm:w-[18px] sm:h-[18px]"></i></button>

      <button id="bmarkBtn" title="Bookmarks" class="p-1.5 text-[#6f5f4b] dark:text-gray-300 bg-[#fffaf1]/90 dark:bg-gray-800/90 border border-[#e2d2ba] dark:border-gray-700 rounded-lg shadow-md backdrop-blur hover:bg-white dark:hover:bg-gray-700 active:scale-95 sm:p-2"><i data-lucide="bookmark" class="w-4 h-4 sm:w-[18px] sm:h-[18px]"></i></button>

      <button id="searchBtn" title="Find in chapter (Ctrl+F)" class="p-1.5 text-[#6f5f4b] dark:text-gray-300 bg-[#fffaf1]/90 dark:bg-gray-800/90 border border-[#e2d2ba] dark:border-gray-700 rounded-lg shadow-md backdrop-blur hover:bg-white dark:hover:bg-gray-700 active:scale-95 sm:p-2"><i data-lucide="search" class="w-4 h-4 sm:w-[18px] sm:h-[18px]"></i></button>

    <div class="absolute top-0 left-0 right-0 z-40 h-0.5 bg-gray-200 dark:bg-gray-700">

    <h2 id="titleEl" class="text-[9.5px] sm:text-[10.5px] md:text-xs uppercase tracking-wide font-semibold text-[#9b8a72] dark:text-gray-400 text-center px-4 pt-12 sm:px-24 sm:pt-5 md:pt-6 shrink-0"></h2>

    <div class="relative flex justify-center flex-1 w-full min-h-0 overflow-hidden">

      <!-- COVER -->
      <div id="coverView" class="hide items-center justify-center h-full overflow-hidden bg-[#fbf7ef] rounded-lg shadow-2xl cursor-pointer dark:bg-gray-800">

        <img id="introImg" class="object-contain w-auto h-full max-w-full" alt="Chapter" />
        <div id="introFallback" class="hide flex items-center justify-center w-full h-full p-6 bg-gradient-to-br from-gray-700 to-gray-900">
          <h1 id="introFallbackTitle" class="font-serif text-base tracking-wider text-center text-white sm:text-lg md:text-xl lg:text-2xl"></h1>
        </div>
        <div class="absolute bottom-3 left-1/2 -translate-x-1/2 pointer-events-none sm:bottom-4">
          <p id="introHint" class="rounded-full bg-black/45 px-3 py-1 text-[8px] text-white/90 backdrop-blur-sm sm:text-[10px] md:text-xs">Tap to begin →</p>
        </div>
      </div>

      <!-- READING -->
      <div id="readingView" class="hide w-full h-full min-h-0 p-1 rounded-lg sm:p-1.5 md:p-2">
        <div id="spread" class="flex w-full h-full min-h-0 overflow-hidden text-[#3f4654] rounded-lg cursor-pointer dark:text-gray-200">
          <div id="leftPage" class="relative flex flex-col flex-1 min-h-0 overflow-hidden border-r border-[#d8c8ae] dark:border-gray-700">
            <div id="leftBody" class="page-body font-serif flex-1 min-h-0 overflow-hidden px-5 pt-5 pb-2 text-justify text-[#3f4654] dark:text-gray-300 sm:px-6 sm:pt-6 sm:pb-3 md:px-7 md:pt-7 md:pb-4 lg:px-8 select-text"></div>
            <div id="leftFolio" class="text-center font-mono text-[#b1a18a] dark:text-gray-500 py-1 shrink-0 text-[8px] sm:text-[9px] md:text-[10px]"></div>
          </div>
          <div id="rightPage" class="relative flex flex-col flex-1 min-h-0 overflow-hidden">
            <div id="rightBody" class="page-body font-serif flex-1 min-h-0 overflow-hidden px-5 pt-5 pb-2 text-justify text-[#3f4654] dark:text-gray-300 sm:px-6 sm:pt-6 sm:pb-3 md:px-7 md:pt-7 md:pb-4 lg:px-8 select-text"></div>
            <div id="rightFolio" class="text-center font-mono text-[#b1a18a] dark:text-gray-500 py-1 shrink-0 text-[8px] sm:text-[9px] md:text-[10px]"></div>
          </div>
        </div>
      </div>

    </div>

    <div class="flex gap-3 text-[8px] text-[#a89880] dark:text-gray-500 shrink-0 pb-0.5 sm:gap-4 sm:text-[9px] md:text-[10px]">
      <span>← Tap left</span><span>Tap right →</span>
    </div>
  </div>
</div>

<div id="measure"></div>

<script>
const $ = (id) => document.getElementById(id);
const reader = $('reader');
const measure = $('measure');
const leftBody = $('leftBody'), rightBody = $('rightBody');
const leftFolio = $('leftFolio'), rightFolio = $('rightFolio');
const spread = $('spread'), rightPage = $('rightPage');
const titleEl = $('titleEl'), progressBar = $('progressBar');
const coverView = $('coverView'), introView = $('introView'), readingView = $('readingView');

let BOOK = null;
let view = 'cover';
let chapterIndex = 0;
let pages = [], page = 0;
let fontSize = 16, lineHeight = 1.65, fontFamily = 'serif';
let repaginating = false;
const isMobile = () => window.innerWidth < 768;
const isDark = () => document.documentElement.classList.contains('dark');

/* ─── HTML escape helpers ──────────────────────────────────────── */
function escHtml(t){
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(t){
  return String(t).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ─── Reading activity log ──────────────────────────────────────── */
function logReadingActivity(){
  try{
    const today = new Date().toISOString().slice(0,10);
    const raw = JSON.parse(localStorage.getItem('reading-log')) || {};
    raw[today] = (raw[today] || 0) + 1;
    localStorage.setItem('reading-log', JSON.stringify(raw));
  }catch(e){}
}

/* ─── Highlights ────────────────────────────────────────────────── */
const hlKey = () => `highlights-${BOOK ? BOOK.id : 'x'}`;
let highlights = [];

function loadHighlights(){
  try{ highlights = JSON.parse(localStorage.getItem(hlKey())) || []; }catch{ highlights = []; }
  if(!Array.isArray(highlights)) highlights = [];
}
function saveHighlights(){
  try{ localStorage.setItem(hlKey(), JSON.stringify(highlights)); }catch(e){}
}

// Walk text nodes to get absolute char offset within container
function getAbsoluteOffset(container, targetNode, offset){
  let total = 0;
  const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
  while(walker.nextNode()){
    if(walker.currentNode === targetNode) return total + offset;
    total += walker.currentNode.length;
  }
  return total + offset;
}

let selState = null; // {chapterIndex, start, end, text}
let pendingHlColor = null;

function handleTextSelection(){
  if(view !== 'reading'){ hideHlToolbar(); return; }
  const sel = window.getSelection();
  if(!sel || sel.rangeCount === 0 || sel.isCollapsed){ hideHlToolbar(); return; }
  const range = sel.getRangeAt(0);

  let pageBody = null, pageIdx = -1;
  const L = spreadStart();
  if(leftBody.contains(range.commonAncestorContainer)){
    pageBody = leftBody; pageIdx = L;
  } else if(!isMobile() && rightBody.contains(range.commonAncestorContainer)){
    pageBody = rightBody; pageIdx = L + 1;
  }
  if(!pageBody || pageIdx < 0 || pageIdx >= pages.length){ hideHlToolbar(); return; }

  const pd = pages[pageIdx];
  const startInPage = getAbsoluteOffset(pageBody, range.startContainer, range.startOffset);
  const endInPage   = getAbsoluteOffset(pageBody, range.endContainer,   range.endOffset);
  if(startInPage >= endInPage){ hideHlToolbar(); return; }

  const txt = sel.toString().trim();
  if(!txt){ hideHlToolbar(); return; }

  selState = { chapterIndex, start: pd.start + startInPage, end: pd.start + endInPage, text: txt };

  const rect = range.getBoundingClientRect();
  showHlToolbar(rect);
}

function showHlToolbar(rect){
  const tb = $('hlToolbar');
  tb.classList.remove('hide');
  if(window.lucide) lucide.createIcons({element: tb});
  const tbW = tb.offsetWidth || 200;
  const tbH = tb.offsetHeight || 36;
  let x = rect.left + rect.width / 2 - tbW / 2;
  let y = rect.top - tbH - 8;
  if(y < 8) y = rect.bottom + 8;
  x = Math.max(8, Math.min(x, window.innerWidth - tbW - 8));
  tb.style.left = x + 'px'; tb.style.top = y + 'px';
}

function hideHlToolbar(){ $('hlToolbar').classList.add('hide'); selState = null; }

function saveHighlight(color, note){
  if(!selState) return;
  // Remove any existing highlights that overlap with the selected range
  highlights = highlights.filter(h =>
    h.chapterIndex !== selState.chapterIndex ||
    h.end <= selState.start ||
    h.start >= selState.end
  );
  highlights.push({ id: Date.now(), chapterIndex: selState.chapterIndex,
    start: selState.start, end: selState.end, text: selState.text || '', color, note: note || '' });
  saveHighlights();
  hideHlToolbar();
  window.getSelection()?.removeAllRanges();
  renderReading();
}

function showHlPopup(hl, rect){
  const popup = $('hlPopup');
  const noteEl = $('hlPopupNote');
  noteEl.textContent = hl.note || '';
  noteEl.classList.toggle('hidden', !hl.note);
  popup.classList.remove('hide');
  if(window.lucide) lucide.createIcons({element: popup});

  const pw = popup.offsetWidth || 200;
  const ph = popup.offsetHeight || 60;
  let x = rect.left + rect.width / 2 - pw / 2;
  let y = rect.bottom + 8;
  if(y + ph > window.innerHeight - 8) y = rect.top - ph - 8;
  x = Math.max(8, Math.min(x, window.innerWidth - pw - 8));
  popup.style.left = x + 'px'; popup.style.top = y + 'px';

  $('hlPopupDel').onclick = () => {
    highlights = highlights.filter(h => h.id !== hl.id);
    saveHighlights(); popup.classList.add('hide'); renderReading();
  };

  setTimeout(() => {
    const close = () => { popup.classList.add('hide'); document.removeEventListener('click', close); };
    document.addEventListener('click', close);
  }, 50);
}

function renderPageText(pageText, pageStart){
  const pageEnd = pageStart + pageText.length;
  const ranges = [];
  // User highlights
  highlights.filter(h=>h.chapterIndex===chapterIndex&&h.start<pageEnd&&h.end>pageStart).forEach(h=>{
    ranges.push({s:Math.max(0,h.start-pageStart),e:Math.min(pageText.length,h.end-pageStart),pri:1,color:h.color,hlid:h.id,note:h.note||''});
  });
  // Search matches (priority 2 = other, 3 = current)
  if(searchActive&&searchQuery){
    searchMatches.forEach((m,i)=>{
      if(m.start<pageEnd&&m.end>pageStart){
        ranges.push({s:Math.max(0,m.start-pageStart),e:Math.min(pageText.length,m.end-pageStart),pri:i===searchMatchIdx?3:2,cur:i===searchMatchIdx});
      }
    });
  }
  if(!ranges.length) return escHtml(pageText);
  // Build breakpoints so no two spans overlap
  const pts=new Set([0,pageText.length]);
  ranges.forEach(r=>{if(r.s>0)pts.add(r.s);if(r.e<pageText.length)pts.add(r.e);});
  const sorted=[...pts].sort((a,b)=>a-b);
  let html='';
  for(let i=0;i<sorted.length-1;i++){
    const s=sorted[i],e=sorted[i+1]; if(s>=e) continue;
    const seg=pageText.slice(s,e);
    const cov=ranges.filter(r=>r.s<=s&&r.e>=e);
    if(!cov.length){html+=escHtml(seg);continue;}
    const best=cov.reduce((a,b)=>b.pri>a.pri?b:a);
    if(best.pri>=2){
      const style=best.cur
        ?'background:rgba(251,191,36,0.95);outline:2px solid rgba(217,119,6,0.85);border-radius:3px;outline-offset:-1px;padding:0 .12em;line-height:1.3;box-decoration-break:clone;'
        :'background:rgba(253,230,138,0.7);border-radius:3px;padding:0 .12em;line-height:1.3;box-decoration-break:clone;';
      html+=`<mark style="${style}">${escHtml(seg)}</mark>`;
    } else {
      const na=best.note?` title="${escAttr(best.note)}"`:''
      html+=`<mark style="background:${escAttr(best.color)};border-radius:2px;cursor:pointer;padding:0 .12em;line-height:1.3;box-decoration-break:clone;"${na} data-hlid="${best.hlid}">${escHtml(seg)}</mark>`;
    }
  }
  return html;
}

function wireHighlightClicks(el){
  el.querySelectorAll('mark[data-hlid]').forEach(mark => {
    mark.addEventListener('click', e => {
      e.stopPropagation();
      const hl = highlights.find(h => h.id === Number(mark.dataset.hlid));
      if(hl) showHlPopup(hl, mark.getBoundingClientRect());
    });
  });
}

/* ─── Bookmarks ─────────────────────────────────────────────────── */
const bmarkKey = () => `bookmarks-${BOOK ? BOOK.id : 'x'}`;
let bookmarks = [];

function loadBookmarks(){
  try{ bookmarks = JSON.parse(localStorage.getItem(bmarkKey())) || []; }catch{ bookmarks = []; }
  if(!Array.isArray(bookmarks)) bookmarks = [];
}
function saveBookmarks(){
  try{ localStorage.setItem(bmarkKey(), JSON.stringify(bookmarks)); }catch(e){}
}

function addBookmarkHere(){
  let bmChapter, bmPage, bmType, label;
  if(view === 'cover'){
    bmChapter = -1; bmPage = 0; bmType = 'cover';
    label = 'Cover';
  } else if(view === 'intro'){
    bmChapter = chapterIndex; bmPage = 0; bmType = 'intro';
    const ch = BOOK.chapters[chapterIndex];
    label = (ch ? (ch.title || `Chapter ${chapterIndex+1}`) : `Chapter ${chapterIndex+1}`) + ' — Intro';
  } else {
    bmChapter = chapterIndex; bmPage = page; bmType = 'reading';
    const ch = BOOK.chapters[chapterIndex];
    label = (ch ? (ch.title || `Chapter ${chapterIndex+1}`) : `Chapter ${chapterIndex+1}`) + ` — p.${page+1}`;
  }
  bookmarks = bookmarks.filter(b => !(b.chapterIndex === bmChapter && b.page === bmPage && b.type === bmType));
  bookmarks.unshift({ id: Date.now(), chapterIndex: bmChapter, page: bmPage, type: bmType, label, savedAt: Date.now() });
  saveBookmarks(); buildBmarkList();
  const btn = $('bmarkBtn'); btn.classList.add('!text-amber-500');
  setTimeout(() => btn.classList.remove('!text-amber-500'), 800);
}

function buildBmarkList(){
  const list = $('bmarkList');
  if(!bookmarks.length){
    list.innerHTML='<p style="font-size:10px;color:#b0a090;text-align:center;padding:2.5rem 1.5rem;line-height:1.7">No bookmarks yet.<br><span style="font-size:9px;opacity:0.75">Press "Add Bookmark Here"<br>while reading.</span></p>';
    return;
  }
  const bmDark=isDark();
  const bmTextClr=bmDark?'#d4c4a8':'#3a2e1f';
  const bmSubClr=bmDark?'#8a7060':'#a89070';
  const bmAccent=bmDark?'#fbbf24':'#d97706';
  list.innerHTML=bookmarks.map(bm=>{
    const pts=bm.label.split(' — ');
    const chTitle=escHtml(pts[0]||bm.label);
    const pageInfo=escHtml(pts[1]||'');
    const date=new Date(bm.savedAt).toLocaleDateString(undefined,{month:'short',day:'numeric'});
    const hoverBg=bmDark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.06)';
    const itemBg=bmDark?'rgba(255,255,255,0.06)':'rgba(255,255,255,0.88)';
    const borderColor=bmDark?'rgba(255,255,255,0.08)':'rgba(210,190,160,0.32)';
    return '<div class="bm-item" style="display:flex;align-items:flex-start;margin:6px 6px;border-radius:16px;cursor:pointer;transition:transform 0.18s,background 0.18s;overflow:hidden;background:'+itemBg+';border:1px solid '+borderColor+'" onmouseenter="this.style.background=\''+hoverBg+'\';this.style.transform=\'translateY(-1px)\';this.querySelector(\'.bm-del\').style.opacity=\'1\'" onmouseleave="this.style.background=\''+itemBg+'\';this.style.transform=\'translateY(0)\';this.querySelector(\'.bm-del\').style.opacity=\'0\'" data-bmid="'+bm.id+'">'
      +'<div style="width:4px;background:'+bmAccent+';border-radius:4px 0 0 4px;flex-shrink:0"></div>'
      +'<div style="flex:1;min-width:0;padding:9px 10px">'
      +'<p style="font-size:9.5px;font-style:italic;color:'+bmTextClr+';line-height:1.4;word-break:break-word;margin:0">“'+chTitle+'”</p>'
      +'<p style="font-size:8.5px;color:'+bmSubClr+';margin:4px 0 0;line-height:1.4">'+(pageInfo?pageInfo+' · ':'')+date+'</p>'
      +'</div>'
      +'<button class="bm-del" style="align-self:flex-start;margin:8px 8px 0 0;opacity:0;padding:4px;color:#c4b09a;border-radius:6px;line-height:0;transition:opacity 0.15s,color 0.1s;background:none;border:none;cursor:pointer;flex-shrink:0" onmouseenter="this.style.color=\'#ef4444\'" onmouseleave="this.style.color=\'#c4b09a\'" data-bmid="'+bm.id+'">'
      +'<i data-lucide="x" class="w-3 h-3"></i></button>'
      +'</div>';
  }).join('');

  list.querySelectorAll('.bm-item').forEach(el => {
    el.addEventListener('click', () => {
      const bm = bookmarks.find(b => b.id === Number(el.dataset.bmid));
      if(!bm) return;
      closeBmarkDrawer();
      if(bm.type === 'cover'){
        showCover();
      } else if(bm.type === 'intro'){
        showIntro(bm.chapterIndex);
      } else {
        if(bm.chapterIndex !== chapterIndex || view !== 'reading'){
          chapterIndex = bm.chapterIndex;
          const targetPage = bm.page;
          showView('reading');
          requestAnimationFrame(() => {
            const res = paginate(BOOK.chapters[chapterIndex].content || '');
            repaginating = false;
            if(res){ pages = res; page = Math.min(targetPage, pages.length - 1); renderReading(); saveProgress(); }
          });
        } else {
          page = Math.min(bm.page, pages.length - 1);
          renderReading(); saveProgress();
        }
      }
    });
  });

  list.querySelectorAll('.bm-del').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      bookmarks = bookmarks.filter(b => b.id !== Number(btn.dataset.bmid));
      saveBookmarks(); buildBmarkList();
    });
  });

  if(window.lucide) lucide.createIcons({element: list});
}

function openBmarkDrawer(){ closeSearch(); closeHighlightsDrawer(); closeToc(); closeSettingsPanel(); $('bmarkWrap').classList.remove('hide'); buildBmarkList(); }
function closeBmarkDrawer(){ $('bmarkWrap').classList.add('hide'); }

/* ─── Chapter completion ────────────────────────────────────────── */
const completedKey = () => `completed-${BOOK ? BOOK.id : 'x'}`;
let completedChapters = new Set();

function loadCompleted(){
  try{ const a=JSON.parse(localStorage.getItem(completedKey()))||[]; completedChapters=new Set(Array.isArray(a)?a:[]); }catch{ completedChapters=new Set(); }
}
function saveCompleted(){
  try{ localStorage.setItem(completedKey(),JSON.stringify([...completedChapters])); }catch(e){}
}
function checkChapterCompletion(){
  if(!pages.length||view!=='reading') return;
  const L=spreadStart(); const R=isMobile()?-1:(L+1<pages.length?L+1:-1);
  if((R!==-1?R:L)>=pages.length-1 && !completedChapters.has(chapterIndex)){
    completedChapters.add(chapterIndex); saveCompleted(); updateTocCheck(chapterIndex);
  }
}
function updateTocCheck(ci){
  const el=document.querySelector('#tocList .toc-item[data-toc="'+ci+'"] .toc-check');
  if(el) el.classList.remove('hide');
}

/* ─── Search ────────────────────────────────────────────────────── */
let searchQuery='', searchMatches=[], searchMatchIdx=-1, searchActive=false;

function closeSettingsPanel(){ const panel=$('readerControlsPanel'); if(!panel.classList.contains('hidden')) panel.classList.add('hidden'); }
function openSearch(){
  closeHighlightsDrawer(); closeBmarkDrawer(); closeSettingsPanel();
  searchActive=true; $('searchBar').classList.remove('hide');
  if(window.lucide) lucide.createIcons({element:$('searchBar')});
  setTimeout(()=>$('searchInput').focus(),40);
}
function closeSearch(){
  searchActive=false; searchQuery=''; searchMatches=[]; searchMatchIdx=-1;
  $('searchInput').value=''; $('searchCount').textContent='';
  $('searchBar').classList.add('hide');
  if(view==='reading') renderReading();
}
function clearSearchMatches(){
  searchMatches=[]; searchMatchIdx=-1; updateSearchCount();
}
function runSearch(){
  searchQuery=($('searchInput').value||'').trim();
  searchMatches=[];
  if(!searchQuery||!BOOK||view!=='reading'){ searchMatchIdx=-1; updateSearchCount(); if(view==='reading') renderReading(); return; }
  const content=BOOK.chapters[chapterIndex].content||'';
  const lower=content.toLowerCase(); const q=searchQuery.toLowerCase();
  let pos=0;
  while(pos<lower.length){ const idx=lower.indexOf(q,pos); if(idx===-1) break; searchMatches.push({start:idx,end:idx+q.length}); pos=idx+1; }
  searchMatchIdx=searchMatches.length>0?0:-1;
  if(searchMatchIdx>=0) navigateToSearchMatch(0); else { renderReading(); updateSearchCount(); }
}
function navigateToSearchMatch(idx){
  if(!searchMatches.length) return;
  idx=((idx%searchMatches.length)+searchMatches.length)%searchMatches.length;
  searchMatchIdx=idx;
  const m=searchMatches[idx];
  const pi=pages.findIndex(p=>m.start>=p.start&&m.start<p.end);
  if(pi!==-1){ page=isMobile()?pi:Math.floor(pi/2)*2; renderReading(); }
  updateSearchCount();
}
function updateSearchCount(){
  const el=$('searchCount');
  if(!searchQuery){ el.textContent=''; return; }
  if(!searchMatches.length){ el.textContent='No results'; el.style.color='#ef4444'; return; }
  el.style.color='';
  el.textContent=(searchMatchIdx+1)+' / '+searchMatches.length;
}

/* ─── Highlights & Notes Panel ──────────────────────────────────── */
function hlDashColor(rgba){
  if(rgba.includes('254,249,195')) return '#9a6f00';
  if(rgba.includes('187,247,208')) return '#1a7a4a';
  if(rgba.includes('191,219,254')) return '#1d5fa8';
  if(rgba.includes('254,202,202')) return '#b83030';
  return '#c47d2a';
}

/* ─── Pagination engine ─────────────────────────────────────────── */
function applySpreadLayout(){
  const mobile = isMobile();
  rightPage.style.display = mobile ? 'none' : 'flex';
  rightPage.style.visibility = 'visible';
}

function skipWS(t,i){ while(i<t.length && /\s/.test(t[i])) i++; return i; }
function wordBoundary(t,start,target){
  if(target>=t.length) return t.length;
  let b=Math.min(target,t.length);
  while(b>start && !/\s/.test(t[b]) && !/\s/.test(t[b-1])) b--;
  return b>start?b:Math.min(target,t.length);
}
function fits(t){ measure.textContent = t || ' '; return measure.scrollHeight <= measure.clientHeight + 1; }
function paginate(text){
  applySpreadLayout();
  const cs = getComputedStyle(leftBody);
  const w = leftBody.clientWidth  - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
  const h = leftBody.clientHeight - parseFloat(cs.paddingTop)  - parseFloat(cs.paddingBottom);
  if(w<=4 || h<=4) return null;
  ['fontFamily','fontSize','fontWeight','fontStyle','lineHeight','letterSpacing','wordSpacing','whiteSpace','wordBreak','textAlign','textTransform','hyphens']
    .forEach(p => { measure.style[p] = cs[p]; });
  measure.style.boxSizing='border-box'; measure.style.padding='0';
  measure.style.width=w+'px'; measure.style.height=h+'px'; measure.style.overflow='hidden';
  const out=[]; let start=0;
  while(start<text.length){
    start=skipWS(text,start); if(start>=text.length) break;
    let lo=start+1, hi=text.length, best=start;
    while(lo<=hi){ const mid=(lo+hi)>>1; let end=wordBoundary(text,start,mid);
      if(end<=start) end=Math.min(mid,text.length);
      if(fits(text.slice(start,end))){ best=end; lo=mid+1; } else hi=mid-1; }
    const end=best>start?best:Math.min(start+1,text.length);
    out.push({text:text.slice(start,end),start,end}); start=end;
  }
  return out.length?out:[{text:'',start:0,end:0}];
}
function repaginate(retry=0){
  if(repaginating || !BOOK || view!=='reading') return;
  repaginating=true;
  requestAnimationFrame(()=>{
    const prevStart = pages[page]?pages[page].start:0;
    const res = paginate(BOOK.chapters[chapterIndex].content || '');
    if(!res){ repaginating=false; if(retry<15) setTimeout(()=>repaginate(retry+1),40); return; }
    pages=res;
    let idx=pages.findIndex(p=>prevStart>=p.start && prevStart<p.end);
    page = idx<0?0:Math.min(idx,pages.length-1);
    renderReading(); saveProgress(); repaginating=false;
  });
}

/* ─── Views ─────────────────────────────────────────────────────── */
function showView(v){
  view=v;
  coverView.classList.toggle('hide', v!=='cover'); coverView.classList.toggle('flex', v==='cover');
  introView.classList.toggle('hide', v!=='intro'); introView.classList.toggle('flex', v==='intro');
  readingView.classList.toggle('hide', v!=='reading');
  updateTitle();
}
function updateTitle(){
  if(!BOOK){ titleEl.textContent=''; return; }
  titleEl.textContent = view==='cover' ? (BOOK.title||'') : (BOOK.chapters[chapterIndex].title||'');
}
function setImgWithFallback(imgEl, fbEl, src){
  if(src){
    imgEl.classList.remove('hide'); fbEl.classList.add('hide');
    imgEl.onerror = () => { imgEl.classList.add('hide'); fbEl.classList.remove('hide'); };
    imgEl.src = src;
  } else { imgEl.classList.add('hide'); fbEl.classList.remove('hide'); }
}
function showCover(){
  clearSearchMatches();
  $('coverFallbackTitle').textContent = BOOK.title || '';
  setImgWithFallback($('coverImg'), $('coverFallback'), BOOK.cover);
  showView('cover'); progressBar.style.width='0%'; markToc();
}
function showIntro(ci){
  chapterIndex = Math.max(0, Math.min(ci, BOOK.chapters.length-1));
  clearSearchMatches();
  const ch = BOOK.chapters[chapterIndex];
  $('introFallbackTitle').textContent = ch.title || '';
  setImgWithFallback($('introImg'), $('introFallback'), ch.introImage);

  // Reading time estimate
  const words = Math.round((ch.content || '').split(/\s+/).filter(Boolean).length);
  const mins  = Math.max(1, Math.round(words / 200));
  $('introHint').textContent = `~${mins} min read · Tap to begin →`;

  page=0; showView('intro'); markToc();
}
function openReadingAt(targetPage){
  showView('reading');
  repaginating=true;
  requestAnimationFrame(()=>{
    const res = paginate(BOOK.chapters[chapterIndex].content || '');
    repaginating=false;
    if(!res){ setTimeout(()=>openReadingAt(targetPage),40); return; }
    pages=res;
    page = targetPage==='end' ? pages.length-1 : Math.min(Math.max(targetPage,0), pages.length-1);
    renderReading(); saveProgress(); markToc();
  });
}

/* ─── Reading render ────────────────────────────────────────────── */
function spreadStart(){ return isMobile()?page:Math.floor(page/2)*2; }
function renderReading(){
  applySpreadLayout();
  const L=spreadStart();
  const R=isMobile()?-1:(L+1<pages.length?L+1:-1);

  const ptL = pages[L]?.text || '';
  leftBody.innerHTML = renderPageText(ptL, pages[L]?.start || 0);
  wireHighlightClicks(leftBody);
  leftFolio.textContent = (L+1)+' / '+pages.length;

  if(R!==-1){
    const ptR = pages[R]?.text || '';
    rightBody.innerHTML = renderPageText(ptR, pages[R]?.start || 0);
    wireHighlightClicks(rightBody);
    rightFolio.textContent=(R+1)+' / '+pages.length;
    rightPage.style.visibility='visible';
  }else{
    rightBody.innerHTML=''; rightFolio.textContent='';
  }
  const lastShown=(R!==-1?R:L)+1;
  progressBar.style.width=Math.min(100,(lastShown/pages.length)*100)+'%';
  checkChapterCompletion();
  updateTitle();
}

/* ─── Navigation ────────────────────────────────────────────────── */
function next(){
  if(view==='cover'){ showIntro(0); return; }
  if(view==='intro'){ openReadingAt(0); return; }
  if(isMobile()){
    if(page<pages.length-1){ page++; renderReading(); saveProgress(); }
    else if(chapterIndex<BOOK.chapters.length-1){ showIntro(chapterIndex+1); }
  }else{
    const L=spreadStart();
    if(L+2<pages.length){ page=L+2; renderReading(); saveProgress(); }
    else if(chapterIndex<BOOK.chapters.length-1){ showIntro(chapterIndex+1); }
  }
}
function prev(){
  if(view==='cover'){ return; }
  if(view==='intro'){
    if(chapterIndex>0){ chapterIndex--; openReadingAt('end'); } else { showCover(); }
    return;
  }
  if(isMobile()){
    if(page>0){ page--; renderReading(); saveProgress(); } else { showIntro(chapterIndex); }
  }else{
    const L=spreadStart();
    if(L-2>=0){ page=L-2; renderReading(); saveProgress(); } else { showIntro(chapterIndex); }
  }
}

function hasTextSelection(){
  const sel = window.getSelection();
  return sel && !sel.isCollapsed && sel.toString().trim().length > 0;
}
function anyPanelOpen(){
  return !$('bmarkWrap').classList.contains('hide') || !$('hlNotesWrap').classList.contains('hide') || !$('tocWrap').classList.contains('hide');
}
function tapHandler(el){
  el.addEventListener('click',(e)=>{
    if(e.target.closest('mark[data-hlid]')) return;
    if(hasTextSelection()) return;
    if(anyPanelOpen()) return; // let document click handler close the panel
    const r=el.getBoundingClientRect(); ((e.clientX-r.left)<r.width/2)?prev():next();
  });
  let tx=0;
  el.addEventListener('touchstart',e=>{ tx=e.touches[0].clientX; },{passive:true});
  el.addEventListener('touchend',e=>{
    if(hasTextSelection()) return;
    if(anyPanelOpen()) return; // swipe outside panel just dismisses it
    const d=tx-e.changedTouches[0].clientX; if(d>50) next(); else if(d<-50) prev();
  });
}

  if(e.key==='ArrowRight' && !searchActive) next();
  if(e.key==='ArrowLeft' && !searchActive) prev();
  if((e.ctrlKey||e.metaKey) && e.key==='f'){ e.preventDefault(); openSearch(); }

});

document.addEventListener('click', e=>{
  const panel=$('readerControlsPanel'); if(!panel.classList.contains('hidden')) panel.classList.add('hidden');
  if(!$('searchBar').classList.contains('hide') && !$('searchBar').contains(e.target) && !$('searchBtn').contains(e.target)) closeSearch();
  if(!$('hlNotesWrap').classList.contains('hide') && !$('hlNotesWrap').contains(e.target) && !$('hlNotesBtn').contains(e.target)) closeHighlightsDrawer();
  if(!$('bmarkWrap').classList.contains('hide') && !$('bmarkWrap').contains(e.target) && !$('bmarkBtn').contains(e.target)) closeBmarkDrawer();
  if(!$('tocWrap').classList.contains('hide') && !$('tocInner').contains(e.target) && !$('tocBtn').contains(e.target)) closeToc();
});
$('readerControls').addEventListener('click',e=>e.stopPropagation());

// Highlight toolbar buttons
document.querySelectorAll('.hlColorBtn').forEach(btn => {
  btn.addEventListener('click', () => saveHighlight(btn.dataset.hlcolor, ''));
});
$('hlNoteBtn').addEventListener('click', () => {
  if(!selState) return;
  pendingHlColor = 'rgba(254,249,195,0.92)'; // default yellow
  $('noteSelText').textContent = `"${selState.text.slice(0, 120)}${selState.text.length > 120 ? '…' : ''}"`;
  $('noteInput').value = '';
  $('noteModal').classList.remove('hide');
  setTimeout(() => $('noteInput').focus(), 50);
});
$('hlCancelBtn').addEventListener('click', () => { hideHlToolbar(); window.getSelection()?.removeAllRanges(); });

// Note modal
$('noteSaveBtn').addEventListener('click', () => {
  const note = $('noteInput').value.trim();
  saveHighlight(pendingHlColor || 'rgba(254,249,195,0.92)', note);
  $('noteModal').classList.add('hide');
});
$('noteCancelBtn').addEventListener('click', () => {
  $('noteModal').classList.add('hide');
  hideHlToolbar();
});

function changeFont(){ applyTypography(); saveSettings(); repaginate(); }
$('fsRange').addEventListener('input',e=>{ fontSize=parseInt(e.target.value); changeFont(); });
document.querySelectorAll('.fsBtn').forEach(b=>b.addEventListener('click',()=>{ fontSize=Math.max(12,Math.min(28,fontSize+parseInt(b.dataset.fs))); changeFont(); }));
$('lhRange').addEventListener('input',e=>{ lineHeight=parseFloat(e.target.value); changeFont(); });
document.querySelectorAll('.lhBtn').forEach(b=>b.addEventListener('click',()=>{ lineHeight=Math.max(1.2,Math.min(2,+(lineHeight+parseFloat(b.dataset.lh)).toFixed(2))); changeFont(); }));
document.querySelectorAll('.ffBtn').forEach(b=>b.addEventListener('click',()=>{ fontFamily=b.dataset.ff; changeFont(); }));
$('themeLight').addEventListener('click',()=>setTheme(false));
$('themeDark').addEventListener('click',()=>setTheme(true));
$('resetBtn').addEventListener('click',()=>{ fontSize=16; lineHeight=1.65; fontFamily='serif'; setTheme(false); changeFont(); });
$('fsToggle').addEventListener('click',()=>{ if(!document.fullscreenElement){ document.documentElement.requestFullscreen?.(); } else { document.exitFullscreen?.(); } });
document.addEventListener('fullscreenchange',()=>{ $('fsToggleLabel').textContent = document.fullscreenElement ? 'Exit Full' : 'Fullscreen'; if(window.lucide) lucide.createIcons(); });

const ro=new ResizeObserver(()=>{ if(view==='reading') repaginate(); });
ro.observe(leftBody);
window.addEventListener('orientationchange',()=>{ if(view==='reading') repaginate(); });
if(document.fonts && document.fonts.ready){ document.fonts.ready.then(()=>{ if(view==='reading') repaginate(); }); }

/* ─── Boot ──────────────────────────────────────────────────────── */
try{ if(localStorage.getItem('reader-dark-mode')==='true') document.documentElement.classList.add('dark'); }catch(e){}
reader.style.backgroundColor = isDark() ? '#141414' : '#f4efe6';

async function fetchBooks(){
  const cands=['books.json','/books.json','/data/books.json','./data/books.json','/src/data/books.json'];
  for(const u of cands){ try{ const r=await fetch(u); if(r.ok) return await r.json(); }catch(e){} }
  return null;
}
function fatal(html){ reader.innerHTML='<div class="flex flex-col items-center justify-center gap-3 w-full h-full text-center p-8 dark:text-white">'+html+'</div>'; }

(async function init(){
  const id=new URLSearchParams(location.search).get('id');
  const books=await fetchBooks();
  if(!books){ fatal('<p>Couldn’t load <b>books.json</b>. Place a copy at <code>public/books.json</code>.</p><p><a class="text-amber-600" href="/">← Back to library</a></p>'); return; }
  BOOK = books.find(b=>String(b.id)===String(id)) || books[0];
  if(!BOOK || !Array.isArray(BOOK.chapters) || !BOOK.chapters.length){ fatal('<p>Book not found.</p><p><a class="text-amber-600" href="/">← Back to library</a></p>'); return; }

  document.title = BOOK.title || 'Reader';
  loadSettings();
  applyTypography();
  loadHighlights();
  loadBookmarks();
  loadCompleted();
  buildToc();
  if(window.lucide) lucide.createIcons();

  const saved=loadSaved();
  const resumeParam = new URLSearchParams(location.search).get('resume') === 'true';
  if(resumeParam && saved){
    chapterIndex=Math.min(Math.max(saved.chapter||0,0),BOOK.chapters.length-1);
    showView('reading');
    requestAnimationFrame(()=>{
      const res=paginate(BOOK.chapters[chapterIndex].content||'');
      if(res){ pages=res;
        let idx=pages.findIndex(p=>(saved.position||0)>=p.start && (saved.position||0)<p.end);
        page=idx<0?0:idx; renderReading(); }
      repaginate();
    });
  } else {
    showCover();
  }
})();
</script>
